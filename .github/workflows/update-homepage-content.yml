name: Update Homepage Content

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
    contents: write

jobs:
  update-homepage-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Update homepage content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LUNARCRUSH_API_KEY: ${{ secrets.LUNARCRUSH_API_KEY }}
          NODE_ENV: production
        run: node scripts/update-homepage.js

      - name: Commit homepage content changes
        run: |
          git add content/homepage/*.json
          if [[ -n $(git status -s) ]]; then
            git commit -m "Update homepage content sections

🤖 Generated with Claude Code

Co-Authored-By: Claude <noreply@anthropic.com>"
            echo "✅ Homepage content committed"
          else
            echo "ℹ️ No homepage content changes to commit"
          fi

      - name: Push changes to repository
        run: |
          if [[ -n $(git status -s --cached) ]]; then
            git push origin ${{ github.ref_name }}
            echo "✅ Homepage content pushed successfully"
          else
            echo "ℹ️ No changes to push"
          fi
