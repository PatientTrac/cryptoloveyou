name: Generate Trending SEO Article

on:
  # Run daily at 9 AM UTC
  schedule:
    - cron: '0 9 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Generate trending article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LUNARCRUSH_API_KEY: ${{ secrets.LUNARCRUSH_API_KEY }}
          ARTICLE_GENERATION_API_KEY: ${{ secrets.ARTICLE_GENERATION_API_KEY }}
          BINANCE_AFFILIATE_URL: ${{ secrets.BINANCE_AFFILIATE_URL }}
          COINBASE_AFFILIATE_URL: ${{ secrets.COINBASE_AFFILIATE_URL }}
          BYBIT_AFFILIATE_URL: ${{ secrets.BYBIT_AFFILIATE_URL }}
          LEDGER_AFFILIATE_URL: ${{ secrets.LEDGER_AFFILIATE_URL }}
          TREZOR_AFFILIATE_URL: ${{ secrets.TREZOR_AFFILIATE_URL }}
          AUTO_PUBLISH: false
          SKIP_GIT_COMMIT: false
          SKIP_GIT_PUSH: false
          NODE_ENV: production
        run: node scripts/generate-trending-article.js

      - name: Push changes to repository
        run: |
          if [[ -n $(git status -s) ]]; then
            git push origin ${{ github.ref_name }}
            echo "✅ Article generated and pushed successfully"
          else
            echo "ℹ️ No changes to commit"
          fi
