[build]
  publish = "."
  command = ""

# ── STATIC ASSET CACHING ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), bluetooth=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://www.googletagmanager.com https://www.google-analytics.com https://*.netlify.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://*.netlify.app https://api.anthropic.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://formspree.io; upgrade-insecure-requests"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/js/grok-chat-widget.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── REDIRECTS ─────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/en/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ── NETLIFY FUNCTIONS ─────────────────────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["templates/**"]

[functions."link-integrity"]
  schedule = "0 */6 * * *"

# Daily automated content — AI-generated trending crypto article
# Runs at 13:00 UTC daily (9am EST / 6am PST / 15:00 CET)
# Uses ANTHROPIC_API_KEY env var, generates via Claude, publishes via generate-article.js
[functions."scheduled-trending-seo"]
  schedule = "0 13 * * *"
