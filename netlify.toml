[build]
  # Publish directory (if you have a built site, otherwise set to the root)
  publish = "."

  # Functions directory
  functions = "netlify/functions"

# Function configuration
[functions]
  # Set Node.js version
  node_bundler = "esbuild"

  # External node modules that shouldn't be bundled
  external_node_modules = ["@supabase/supabase-js"]

# Environment variables (configure these in Netlify UI)
# SUPABASE_URL = "https://kibgrvomourbyyepidli.supabase.co"
# SUPABASE_ANON_KEY = "your-anon-key-here"

# Redirect rules (optional - for SPA routing if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
