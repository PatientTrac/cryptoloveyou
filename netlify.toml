[build]
  publish = "."
  command = "echo 'Static site - no build needed'"
  functions = "netlify/functions"

# ── Language detection redirects (server-side Accept-Language negotiation) ──
# These fire BEFORE the client-side JS, giving a seamless first-visit experience.
# Cookie override (nf_lang) is handled client-side by /assets/js/lang-switcher.js

[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302
  conditions = {Language = ["fr", "fr-FR", "fr-BE", "fr-CH", "fr-CA"]}

[[redirects]]
  from = "/"
  to = "/de/"
  status = 302
  conditions = {Language = ["de", "de-DE", "de-AT", "de-CH"]}

[[redirects]]
  from = "/"
  to = "/pt/"
  status = 302
  conditions = {Language = ["pt", "pt-BR", "pt-PT"]}

[[redirects]]
  from = "/"
  to = "/es/"
  status = 302
  conditions = {Language = ["es", "es-ES", "es-MX", "es-AR", "es-CO", "es-CL"]}

[[redirects]]
  from = "/"
  to = "/zh/"
  status = 302
  conditions = {Language = ["zh", "zh-CN", "zh-TW", "zh-HK"]}

[[redirects]]
  from = "/"
  to = "/ru/"
  status = 302
  conditions = {Language = ["ru", "ru-RU", "ru-UA"]}

[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 404

# API endpoints for Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/wp-content/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Do NOT aggressively cache the chatbot widget (it changes frequently).
[[headers]]
  for = "/js/grok-chat-widget.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CORS for API functions
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PATCH, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Admin-Key"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["templates/**"]

[functions."scheduled-trending-seo"]
  schedule = "0 9 * * *"

[dev]
  framework = "#static"
  targetPort = 8000
  port = 8888
