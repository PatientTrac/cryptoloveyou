<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — CryptoLoveYou</title>
  <style>
    :root {
      /* Match main site theme colors */
      --bg: #111c2d;
      --bg-secondary: #0d1623;
      --card: #11223d;
      --border: #2a3f5f;
      --text: #e8ecf2;
      --muted: #aeb7c7;
      --accent: #e89b2d;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 1.75rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .logo p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .remember-me label {
      margin: 0;
      font-size: 0.875rem;
      font-weight: normal;
      cursor: pointer;
      color: var(--muted);
    }
    button {
      width: 100%;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #0d1623;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover:not(:disabled) {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid var(--error);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: var(--error);
      font-size: 0.875rem;
      display: none;
    }
    .error.show {
      display: block;
    }
    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>CryptoLoveYou</h1>
      <p>Affiliate Admin Portal</p>
    </div>

    <div class="card">
      <div id="error" class="error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            autocapitalize="off"
            required
            autofocus
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="remember-me">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          <label for="rememberMe">Remember me for 24 hours</label>
        </div>

        <button type="submit" id="loginBtn">
          Login
        </button>
      </form>

      <div id="loading" class="loading" style="display:none;">
        Logging in...
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // Check if already logged in
    const existingToken = sessionStorage.getItem('auth_token') || localStorage.getItem('auth_token');
    if (existingToken) {
      // Verify token is still valid
      fetch(`${API_BASE}/.netlify/functions/auth/session`, {
        headers: { 'Authorization': `Bearer ${existingToken}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          window.location.href = '/admin/';
        }
      })
      .catch(() => {
        // Token invalid, clear it
        sessionStorage.removeItem('auth_token');
        localStorage.removeItem('auth_token');
      });
    }

    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('error');
    const loginBtn = document.getElementById('loginBtn');
    const loadingDiv = document.getElementById('loading');

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }

    function hideError() {
      errorDiv.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!username || !password) {
        showError('Please enter both username and password');
        return;
      }

      // Disable form
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      loadingDiv.style.display = 'block';

      try {
        const response = await fetch(`${API_BASE}/.netlify/functions/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Store token
        const storage = rememberMe ? localStorage : sessionStorage;
        storage.setItem('auth_token', data.token);
        storage.setItem('auth_user', JSON.stringify(data.user));

        // Redirect to admin dashboard
        window.location.href = '/admin/';

      } catch (error) {
        console.error('Login error:', error);
        showError(error.message || 'Login failed. Please try again.');

        // Re-enable form
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
        loadingDiv.style.display = 'none';
      }
    });

    // Clear any old API keys from session
    sessionStorage.removeItem('ADMIN_API_KEY');
  </script>
</body>
</html>
